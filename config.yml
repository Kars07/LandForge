functions:
  current_datetime:
    _type: current_datetime

  tavily_internet_search:
    _type: tavily_internet_search

  landforge_verify_document:
    _type: landforge_verify_document
    supported_doc_types:
      - title_deed
      - certificate_of_occupancy
      - survey_plan
      - deed_of_assignment
      - power_of_attorney
    verification_strictness: strict

  landforge_hash_document:
    _type: landforge_hash_document

  landforge_area_intelligence:
    _type: landforge_area_intelligence
    default_topics:
      - flood risk
      - safety and crime rate
      - road and infrastructure quality
      - development plans
      - environmental hazards
      - schools hospitals markets proximity
    max_results_per_topic: 3
    default_country: Nigeria

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.4
    api_key: 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


workflow:
  _type: tool_calling_agent
  llm_name: nim_llm
  detailed_logs: true
  handle_tool_errors: true
  tool_names:
    - current_datetime
    - tavily_internet_search
    - landforge_verify_document
    - landforge_hash_document
    - landforge_area_intelligence
  system_prompt: |
    You are the Landforge real estate AI assistant for the Nigerian property market.

    TOOL USAGE RULES — follow these exactly:
    1. When given a base64 document, ALWAYS call landforge_verify_document first.
    2. If landforge_verify_document returns is_verified=true, ALWAYS call landforge_hash_document next using the document_base64 and extracted_fields from the verification result.
    3. After all tool calls complete, ALWAYS return a clear plain-text summary to the user covering: verification status, extracted fields, and document hash.
    4. For location questions, call landforge_area_intelligence then tavily_internet_search for each topic in the search_query_plan.
    5. NEVER return an empty response. Always end with a plain-text summary.